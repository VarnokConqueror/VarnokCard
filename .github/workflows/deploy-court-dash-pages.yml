name: Deploy Court Dash to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'court-dash/**'
      - '.github/workflows/deploy-court-dash-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Court Dash
        uses: actions/upload-pages-artifact@v4
        with:
          path: './court-dash'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
